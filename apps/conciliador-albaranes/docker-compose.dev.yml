services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: conciliador-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: conciliador
      POSTGRES_PASSWORD: conciliador
      POSTGRES_DB: conciliador_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conciliador -d conciliador_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
